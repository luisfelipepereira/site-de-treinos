<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShape | Plataforma de Treino Profissional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #28a745;
            --modal-over: rgba(0,0,0,0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- UI Elements --- */
        header {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.7), var(--dark-bg)), 
                        url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=1470&auto=format&fit=crop') center/cover;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .hero-content h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 8vw, 3.5rem); text-transform: uppercase; letter-spacing: -2px; }
        .hero-content span { color: var(--primary); }

        .container { max-width: 900px; margin: -60px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        .glass-card { background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .gender-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .gender-toggle input { display: none; }
        .gender-toggle label { 
            background: #222; padding: 18px; border-radius: 12px; text-align: center; 
            cursor: pointer; border: 2px solid transparent; font-weight: bold; transition: 0.3s;
        }
        .gender-toggle input:checked + label { border-color: var(--primary); color: var(--primary); background: rgba(255,0,0,0.05); }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }
        
        input, select { background: #000; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; font-size: 1rem; }

        .btn-main { 
            grid-column: 1 / -1; background: var(--primary); color: white; border: none; 
            padding: 18px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-main:hover { filter: brightness(1.2); transform: scale(1.01); }

        /* --- Treino Area --- */
        #training-area { display: none; margin-top: 40px; animation: fadeIn 0.5s; }
        .tabs { display: flex; gap: 5px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tab { flex: 1; padding: 15px; background: #222; border: none; color: white; border-radius: 8px; cursor: pointer; min-width: 100px; font-weight: bold; }
        .tab.active { background: var(--primary); }

        .exercise-card { 
            background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary);
            transition: 0.2s;
        }
        .exercise-card:hover { background: #222; }
        .ex-info h3 { font-size: 1.2rem; margin-bottom: 4px; }
        .ex-info p { color: var(--text-dim); font-size: 0.95rem; }
        
        .btn-video { 
            background: transparent; color: var(--primary); border: 1px solid var(--primary); 
            padding: 8px 16px; border-radius: 6px; font-size: 0.85rem; margin-top: 10px; 
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-video:hover { background: var(--primary); color: white; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Modal - ONDE O VÍDEO É EXIBIDO DENTRO DO SITE --- */
        .modal { 
            display: none; position: fixed; z-index: 2000; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: var(--modal-over); 
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }
        .modal-content { 
            position: relative; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 800px; box-shadow: 0 0 50px rgba(255,0,0,0.2);
        }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; border: 2px solid #333; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .close-modal { 
            color: white; font-size: 40px; position: absolute; top: -50px; right: 0; 
            cursor: pointer; transition: 0.3s; line-height: 1;
        }
        .close-modal:hover { color: var(--primary); }

    </style>
</head>
<body>

<header>
    <div class="hero-content">
        <h1>IRON<span>SHAPE</span></h1>
        <p>A elite do treinamento personalizado.</p>
    </div>
</header>

<div class="container">
    <div class="glass-card">
        <form id="workoutForm">
            <div class="gender-toggle">
                <input type="radio" name="gender" id="m" value="masculino" checked>
                <label for="m">♂ MASCULINO</label>
                <input type="radio" name="gender" id="f" value="feminino">
                <label for="f">♀ FEMININO</label>
            </div>
            <div class="form-grid">
                <input type="number" placeholder="Seu peso atual (kg)" required>
                <select id="goal">
                    <option value="hipertrofia">Foco: Hipertrofia</option>
                    <option value="definicao">Foco: Definição</option>
                </select>
                <button type="submit" class="btn-main">GERAR MEU TREINO ABCD</button>
            </div>
        </form>
    </div>

    <div id="training-area">
        <div class="tabs" id="tabBar"></div>
        <div id="exercise-list"></div>
    </div>
</div>

<div id="videoModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeVideo()">&times;</span>
        <div class="video-wrapper">
            <iframe id="player" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>

            { n: "Tríceps Corda", s: "3x15", d: "45s", v: "vB5OHsJ3EME" }
        ],
        B: [
            { n: "Puxada Frontal", s: "4x10", d: "90s", v: "CAwf7n6Luuc" },
            { n: "Remada Baixa", s: "4x12", d: "60s", v: "GZbfZ033f74" },
            { n: "Remada Cavalinho", s: "3x10", d: "60s", v: "jAnYHe_1FmE" },
            { n: "Rosca Direta Barra", s: "4x10", d: "60s", v: "QwEyU_Y-X8w" },

        ],

            { n: "Elevação Lateral", s: "4x15", d: "45s", v: "WJm8u79Ym_I" },
            { n: "Elevação Frontal", s: "3x12", d: "45s", v: "-t7fuZ0P_B8" },
            { n: "Encolhimento", s: "4x15", d: "60s", v: "W8_9X2u7-2U" },
            { n: "Abdominal Infra", s: "4x20", d: "30s", v: "7X_uD_1G-00" }
        ],
        D: [
            { n: "Agachamento Livre", s: "4x10", d: "120s", v: "R_N_X-7e_0Y" },
            { n: "Leg Press 45", s: "3x12", d: "90s", v: "yZ8_G-0X_0k" },

        ]
    },
    feminino: {
        A: [
            { n: "Agachamento Livre", s: "4x12", d: "90s", v: "R_N_X-7e_0Y" },
            { n: "Leg Press 45", s: "3x15", d: "60s", v: "yZ8_G-0X_0k" },
            { n: "Afundo Halter", s: "3x12", d: "60s", v: "q7rCeOa_n78" },
            { n: "Cadeira Extensora", s: "4x15", d: "45s", v: "7_u-XG_7eY0" },
            { n: "Abdominal Supra", s: "4x20", d: "30s", v: "W8_9X2u7-2U" }
        ],
        B: [
            { n: "Puxada Alta", s: "3x12", d: "45s", v: "CAwf7n6Luuc" },
            { n: "Remada Baixa", s: "3x12", d: "45s", v: "GZbfZ033f74" },
            { n: "Desenvolvimento Halter", s: "3x12", d: "45s", v: "HzIiNhHhhtA" },
            { n: "Tríceps Corda", s: "3x15", d: "30s", v: "vB5OHsJ3EME" },
            { n: "Rosca Halter", s: "3x12", d: "30s", v: "XpB_V99vR_s" }
        ],
        C: [
            { n: "Elevação Pélvica", s: "4x10", d: "90s", v: "h9S8vU2_1A0" },
            { n: "Stiff Barra", s: "4x12", d: "60s", v: "7X_uD_1G-00" },
            { n: "Cadeira Flexora", s: "4x15", d: "45s", v: "0-X_uG-7eY0" },
            { n: "Cadeira Abdutora", s: "3x20", d: "30s", v: "WJm8u79Ym_I" },
            { n: "Glúteo no Cabo", s: "3x15", d: "45s", v: "yZ8_G-0X_0k" }
        ],
        D: [
            { n: "Agachamento Sumô", s: "4x15", d: "60s", v: "R_N_X-7e_0Y" },
            { n: "Panturrilha Sentada", s: "4x20", d: "45s", v: "W8_9X2u7-2U" },
            { n: "Prancha Isométrica", s: "3x60s", d: "30s", v: "7X_uD_1G-00" },
            { n: "Extensão de Lombar", s: "3x15", d: "45s", v: "-t7fuZ0P_B8" },
            { n: "Caminhada Inclinada", s: "15 min", d: "-", v: "rT7DgIZn5nI" }
        ]
    }
};
let currentData = {};

document.getElementById('workoutForm').onsubmit = (e) => {
    e.preventDefault();
    const gender = document.querySelector('input[name="gender"]:checked').value;
    currentData = workoutDB[gender];
    
    // Gera as abas ABCD
    const tabBar = document.getElementById('tabBar');
    tabBar.innerHTML = ['A', 'B', 'C', 'D'].map(day => 
        `<button class="tab ${day==='A'?'active':''}" onclick="renderDay('${day}')">DIA ${day}</button>`
    ).join('');

    document.getElementById('training-area').style.display = 'block';
    renderDay('A');
    
    window.scrollTo({ top: document.getElementById('training-area').offsetTop - 30, behavior: 'smooth' });
};

function renderDay(day) {
    // Atualiza estado visual das abas
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    
    // Fallback caso o evento não exista (chamada inicial)
    if(event && event.target) {
        event.target.classList?.add('active');
    } else {
        document.querySelector('.tab').classList.add('active');
    }

    const list = document.getElementById('exercise-list');
    list.innerHTML = currentData[day].map(ex => `
        <div class="exercise-card">
            <div class="ex-info">
                <h3>${ex.n}</h3>
                <p>${ex.s} | Descanso: ${ex.d}</p>
                <button class="btn-video" onclick="openVideo('${ex.v}')">▶ TUTORIAL RÁPIDO</button>
            </div>
        </div>
    `).join('');
}

// Funções do Modal (Vídeo Interno)
function openVideo(id) {
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('player');
    // Carrega o vídeo com autoplay e parâmetros de segurança
    player.src = `https://www.youtube.com/embed/${id}?autoplay=1&modestbranding=1&rel=0`;
    modal.style.display = 'block';
    document.body.style.overflow = 'hidden'; // Impede scroll no fundo
}

function closeVideo() {
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('player');
    player.src = ""; // Para o vídeo instantaneamente
    modal.style.display = 'none';
    document.body.style.overflow = 'auto'; // Restaura o scroll
}

// Fecha o modal ao clicar fora do vídeo
window.onclick = function(event) {
    const modal = document.getElementById('videoModal');
    if (event.target == modal) closeVideo();
}
</script>
</body>
</html>
